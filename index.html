                        <div className="bg-white rounded-lg shadow p-6">
                            <p className="text-sm text-gray-500">Cash Balance</p>
                            <p className="text-2xl font-bold text-gray-900">{formatCurrency(state.cashbook.balance)}</p>
                        </div>
                        <div className="bg-white rounded-lg shadow p-6">
                            <p className="text-sm text-gray-500">Total Receivables</p>
                            <p className="text-2xl font-bold text-blue-600">{formatCurrency(totalReceivables)}</p>
                        </div>
                        <div className="bg-white rounded-lg shadow p-6">
                            <p className="text-sm text-gray-500">Total Payables</p>
                            <p className="text-2xl font-bold text-red-600">{formatCurrency(totalPayables)}</p>
                        </div>
                        <div className="bg-white rounded-lg shadow p-6">
                            <p className="text-sm text-gray-500">Low Stock Items</p>
                            <p className="text-2xl font-bold text-orange-600">{lowStock.length}</p>
                        </div>
                    </div>
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        <div className="bg-white rounded-lg shadow p-6">
                            <h3 className="text-lg font-semibold mb-4">Profit & Loss Summary</h3>
                            <div className="space-y-3">
                                <div className="flex justify-between"><span>Income</span><span className="text-green-600">{formatCurrency(income)}</span></div>
                                <div className="flex justify-between"><span>Expenses</span><span className="text-red-600">{formatCurrency(expenses)}</span></div>
                                <hr/>
                                <div className="flex justify-between font-bold"><span>Net Profit</span><span className={income - expenses >= 0 ? 'text-green-600' : 'text-red-600'}>{formatCurrency(income - expenses)}</span></div>
                            </div>
                        </div>
                        <div className="bg-white rounded-lg shadow p-6">
                            <h3 className="text-lg font-semibold mb-4">Low Stock Alerts</h3>
                            {lowStock.length === 0 ? (
                                <p className="text-gray-500">All products are well stocked.</p>
                            ) : (
                                <div className="space-y-2">
                                    {lowStock.map(product => (
                                        <div key={product.id} className="flex justify-between items-center p-2 bg-orange-50 rounded">
                                            <span>{product.name}</span>
                                            <span className="text-orange-600 font-semibold">{getTotalStock(product)} {product.unit}</span>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        // ==================== CASHBOOK ====================
        function Cashbook() {
            const { state, dispatch } = useAccounting();
            const [showForm, setShowForm] = useState(false);
            const emptyForm = { type: 'IN', category: 'SALES', amount: '', description: '', paymentMethod: 'CASH', date: new Date().toISOString().split('T')[0] };
            const [formData, setFormData] = useState(emptyForm);
            const [filterFrom, setFilterFrom] = useState('');
            const [filterTo, setFilterTo] = useState('');

            const handleSubmit = (e) => {
                e.preventDefault();
                dispatch({ type: ACTIONS.ADD_CASH_TRANSACTION, payload: { ...formData, amount: parseFloat(formData.amount) } });
                setShowForm(false);
                setFormData(emptyForm);
            };

            const filteredTxns = state.cashbook.transactions.filter(t => (!filterFrom || t.date >= filterFrom) && (!filterTo || t.date <= filterTo));
            const totalDebit = filteredTxns.filter(t => t.type === 'OUT').reduce((s, t) => s + t.amount, 0);
            const totalCredit = filteredTxns.filter(t => t.type === 'IN').reduce((s, t) => s + t.amount, 0);
            const rangeLabel = filterFrom || filterTo ? `${filterFrom ? formatDate(filterFrom) : 'Start'} — ${filterTo ? formatDate(filterTo) : 'Today'}` : '';

            return (
                <div className="space-y-6 fade-in">
                    <div className="flex justify-between items-center flex-wrap gap-2">
                        <h1 className="text-3xl font-bold text-gray-900">Cash Book</h1>
                        <div className="space-x-2 flex">
                            <PrintButton onClick={() => openPrintWindow(rangeLabel ? `Cash Book Report (${rangeLabel})` : 'Cash Book Report', buildCashbookReportHtml(filteredTxns, state.cashbook.balance, totalDebit, totalCredit))} />
                            <button onClick={() => setShowForm(true)} className="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">+ New Transaction</button>
                        </div>
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                        <div className="bg-white rounded-lg shadow p-4">
                            <p className="text-sm text-gray-500">Current Balance</p>
                            <p className="text-2xl font-bold text-gray-900">{formatCurrency(state.cashbook.balance)}</p>
                        </div>
                        <div className="bg-white rounded-lg shadow p-4">
                            <p className="text-sm text-gray-500">Credit (In) {filterFrom || filterTo ? '— Filtered' : ''}</p>
                            <p className="text-2xl font-bold text-green-600">{formatCurrency(totalCredit)}</p>
                        </div>
                        <div className="bg-white rounded-lg shadow p-4">
                            <p className="text-sm text-gray-500">Debit (Out) {filterFrom || filterTo ? '— Filtered' : ''}</p>
                            <p className="text-2xl font-bold text-red-600">{formatCurrency(totalDebit)}</p>
                        </div>
                        <div className="bg-white rounded-lg shadow p-4">
                            <label className="text-xs text-gray-500 block mb-1">Filter by Date</label>
                            <div className="flex items-center gap-1 text-sm">
                                <input type="date" value={filterFrom} onChange={e => setFilterFrom(e.target.value)} className="border rounded px-1.5 py-1 text-xs w-full" />
                                <span className="text-gray-400">–</span>
                                <input type="date" value={filterTo} onChange={e => setFilterTo(e.target.value)} className="border rounded px-1.5 py-1 text-xs w-full" />
                            </div>
                            {(filterFrom || filterTo) && (
                                <button onClick={() => { setFilterFrom(''); setFilterTo(''); }} className="text-xs text-blue-600 hover:text-blue-800 mt-1">Clear filter</button>
                            )}
                        </div>
                    </div>
                    <div className="bg-white rounded-lg shadow overflow-hidden overflow-x-auto">
                        <table className="w-full">
                            <thead className="bg-gray-50">
                                <tr>
                                    <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Date</th>
                                    <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Description</th>
                                    <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Category</th>
                                    <th className="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase">Debit</th>
                                    <th className="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase">Credit</th>
                                    <th className="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase">Balance</th>
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-gray-200">
                                {filteredTxns.length === 0 && (
                                    <tr><td colSpan="6" className="px-6 py-6 text-center text-sm text-gray-400">No transactions in this range</td></tr>
                                )}
                                {filteredTxns.slice().reverse().map(txn => (
                                    <tr key={txn.id} className="hover:bg-gray-50">
                                        <td className="px-6 py-4 text-sm">{formatDate(txn.date)}</td>
                                        <td className="px-6 py-4 text-sm">{txn.description}</td>
                                        <td className="px-6 py-4 text-sm text-gray-500">{txn.category}</td>
                                        <td className="px-6 py-4 text-sm text-right font-medium text-red-600">{txn.type === 'OUT' ? formatCurrency(txn.amount) : ''}</td>
                                        <td className="px-6 py-4 text-sm text-right font-medium text-green-600">{txn.type === 'IN' ? formatCurrency(txn.amount) : ''}</td>
                                        <td className="px-6 py-4 text-sm text-right">{formatCurrency(txn.runningBalance)}</td>
                                    </tr>
                                ))}
                            </tbody>
                            {filteredTxns.length > 0 && (
                                <tfoot>
                                    <tr className="bg-gray-50 font-semibold">
                                        <td className="px-6 py-3 text-sm" colSpan="3">Totals</td>
                                        <td className="px-6 py-3 text-sm text-right text-red-600">{formatCurrency(totalDebit)}</td>
                                        <td className="px-6 py-3 text-sm text-right text-green-600">{formatCurrency(totalCredit)}</td>
                                        <td className="px-6 py-3 text-sm text-right"></td>
                                    </tr>
                                </tfoot>
                            )}
                        </table>
                    </div>

                    <Modal isOpen={showForm} onClose={() => setShowForm(false)} title="New Cash Transaction">
                        <form onSubmit={handleSubmit} className="space-y-4">
                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label className="block text-sm font-medium mb-1">Type</label>
                                    <select value={formData.type} onChange={e => setFormData({...formData, type: e.target.value})} className="w-full border rounded-lg px-3 py-2">
                                        <option value="IN">Cash In</option>
                                        <option value="OUT">Cash Out</option>
                                    </select>
                                </div>
                                <div>
                                    <label className="block text-sm font-medium mb-1">Category</label>
                                    <select value={formData.category} onChange={e => setFormData({...formData, category: e.target.value})} className="w-full border rounded-lg px-3 py-2">
                                        <option value="SALES">Sales</option>
                                        <option value="EXPENSE">Expense</option>
                                        <option value="UTILITIES">Utilities</option>
                                        <option value="RENT">Rent</option>
                                        <option value="OTHER">Other</option>
                                    </select>
                                </div>
                                <div>
                                    <label className="block text-sm font-medium mb-1">Amount</label>
                                    <input type="number" step="0.01" min="0.01" required value={formData.amount} onChange={e => setFormData({...formData, amount: e.target.value})} className="w-full border rounded-lg px-3 py-2" />
                                </div>
                                <div>
                                    <label className="block text-sm font-medium mb-1">Payment Method</label>
                                    <PaymentMethodSelect value={formData.paymentMethod} onChange={e => setFormData({...formData, paymentMethod: e.target.value})} />
                                </div>
                                <div>
                                    <label className="block text-sm font-medium mb-1">Date</label>
                                    <input type="date" required value={formData.date} onChange={e => setFormData({...formData, date: e.target.value})} className="w-full border rounded-lg px-3 py-2" />
                                </div>
                                <div className="col-span-2">
                                    <label className="block text-sm font-medium mb-1">Description</label>
                                    <input type="text" required value={formData.description} onChange={e => setFormData({...formData, description: e.target.value})} className="w-full border rounded-lg px-3 py-2" />
                                </div>
                            </div>
                            <div className="flex justify-end space-x-3">
                                <button type="button" onClick={() => setShowForm(false)} className="px-4 py-2 border rounded-lg">Cancel</button>
                                <button type="submit" className="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">Save Transaction</button>
                            </div>
                        </form>
                    </Modal>
                </div>
            );
        }

        // ==================== RECEIVABLES ====================
        function Receivables() {
            const { state, dispatch } = useAccounting();
            const [activeTab, setActiveTab] = useState('customers');
            const [showInvoiceForm, setShowInvoiceForm] = useState(false);
            const [showPaymentForm, setShowPaymentForm] = useState(false);
            const [showCustomerPaymentForm, setShowCustomerPaymentForm] = useState(false);
            const [showCustomerForm, setShowCustomerForm] = useState(false);
            const [selectedInvoice, setSelectedInvoice] = useState(null);
            const [selectedCustomer, setSelectedCustomer] = useState(null);
            const [invoiceItems, setInvoiceItems] = useState([{ productId: '', quantity: 1, unitPrice: 0 }]);
            const emptyInvoiceForm = { customerId: '', date: new Date().toISOString().split('T')[0], dueDate: '', storeId: state.stores[0] ? state.stores[0].id : '' };
            const [invoiceForm, setInvoiceForm] = useState(emptyInvoiceForm);
            const emptyPaymentForm = { amount: '', paymentMethod: 'CASH', date: new Date().toISOString().split('T')[0] };
            const [paymentForm, setPaymentForm] = useState(emptyPaymentForm);
            const [customerPaymentForm, setCustomerPaymentForm] = useState(emptyPaymentForm);
            const emptyCustomerForm = { name: '', phone: '', email: '', address: '' };
            const [customerForm, setCustomerForm] = useState(emptyCustomerForm);

            const handleCreateInvoice = (e) => {
                e.preventDefault();
                const items = invoiceItems.map(item => {
                    const product = state.inventory.products.find(p => p.id === item.productId);
                    return { productId: item.productId, productName: product ? product.name : '', quantity: parseInt(item.quantity) || 0, unitPrice: parseFloat(item.unitPrice) || 0 };
                });
                dispatch({ type: ACTIONS.CREATE_INVOICE, payload: { ...invoiceForm, items } });
                setShowInvoiceForm(false);
                setInvoiceItems([{ productId: '', quantity: 1, unitPrice: 0 }]);
                setInvoiceForm(emptyInvoiceForm);
            };

            const handleRecordPayment = (e) => {
                e.preventDefault();
                dispatch({ type: ACTIONS.RECORD_INVOICE_PAYMENT, payload: { invoiceId: selectedInvoice.id, amount: parseFloat(paymentForm.amount), paymentMethod: paymentForm.paymentMethod, date: paymentForm.date } });
                setShowPaymentForm(false);
                setPaymentForm(emptyPaymentForm);
            };

            const handleCustomerPayment = (e) => {
                e.preventDefault();
                dispatch({ type: ACTIONS.CUSTOMER_PAYMENT, payload: { customerId: selectedCustomer.id, amount: parseFloat(customerPaymentForm.amount), paymentMethod: customerPaymentForm.paymentMethod, date: customerPaymentForm.date } });
                setShowCustomerPaymentForm(false);
                setCustomerPaymentForm(emptyPaymentForm);
            };

            const handleAddCustomer = (e) => {
                e.preventDefault();
                dispatch({ type: ACTIONS.ADD_CUSTOMER, payload: customerForm });
                setShowCustomerForm(false);
                setCustomerForm(emptyCustomerForm);
            };

            const agingRows = computeAgingRows(state.receivables.customers, 'invoices');
            const allPayments = state.receivables.customers.flatMap(c => (c.payments || []).map(p => ({ ...p, entityName: c.name, applied: p.allocations.map(a => a.invoiceId).join(', ') }))).sort((a, b) => new Date(b.date) - new Date(a.date));

            return (
                <div className="space-y-6 fade-in">
                    <div className="flex justify-between items-center flex-wrap gap-2">
                        <h1 className="text-3xl font-bold text-gray-900">Accounts Receivable</h1>
                        <div className="space-x-2 flex">
                            <PrintButton onClick={() => {
                                if (activeTab === 'aging') openPrintWindow('Receivables Aging Report', buildAgingHtml(agingRows, 'Customer'));
                                else if (activeTab === 'payments') openPrintWindow('Customer Payments Report', buildPaymentsListHtml(allPayments, 'Customer'));
                                else openPrintWindow('Receivables Aging Report', buildAgingHtml(agingRows, 'Customer'));
                            }} />
                            <button onClick={() => setShowCustomerForm(true)} className="px-4 py-2 border border-blue-600 text-blue-600 rounded-lg hover:bg-blue-50">+ Customer</button>
                            <button onClick={() => setShowInvoiceForm(true)} className="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">+ New Invoice</button>
                        </div>
                    </div>

                    <div className="flex space-x-4 border-b">
                        <button onClick={() => setActiveTab('customers')} className={`px-4 py-2 font-medium ${activeTab === 'customers' ? 'border-b-2 border-blue-600 text-blue-600' : 'text-gray-500'}`}>Customers</button>
                        <button onClick={() => setActiveTab('aging')} className={`px-4 py-2 font-medium ${activeTab === 'aging' ? 'border-b-2 border-blue-600 text-blue-600' : 'text-gray-500'}`}>Aging Summary</button>
                        <button onClick={() => setActiveTab('payments')} className={`px-4 py-2 font-medium ${activeTab === 'payments' ? 'border-b-2 border-blue-600 text-blue-600' : 'text-gray-500'}`}>Payments</button>
                    </div>

                    {activeTab === 'customers' && (
                        <div className="space-y-4">
                            {state.receivables.customers.length === 0 && (
                                <div className="bg-white rounded-lg shadow p-6 text-gray-500 text-center">No customers yet. Add one to get started.</div>
                            )}
                            {state.receivables.customers.map(customer => (
                                <div key={customer.id} className="bg-white rounded-lg shadow p-6">
                                    <div className="flex justify-between items-start mb-4 flex-wrap gap-2">
                                        <div>
                                            <h3 className="text-lg font-semibold">{customer.name}</h3>
                                            <p className="text-sm text-gray-500">{customer.email} • {customer.phone}</p>
                                        </div>
                                        <div className="flex items-center gap-4">
                                            <div className="text-right">
                                                <p className="text-sm text-gray-500">Outstanding</p>
                                                <p className="text-2xl font-bold text-blue-600">{formatCurrency(customer.totalReceivables)}</p>
                                            </div>
                                            <div className="space-x-2 flex flex-col gap-2">
                                                <button disabled={customer.totalReceivables <= 0} onClick={() => { setSelectedCustomer(customer); setCustomerPaymentForm({...emptyPaymentForm, amount: customer.totalReceivables.toString()}); setShowCustomerPaymentForm(true); }} className="px-3 py-1.5 text-sm bg-green-600 text-white rounded-lg hover:bg-green-700 disabled:opacity-40 disabled:cursor-not-allowed">+ Payment</button>
                                                <button onClick={() => openPrintWindow(`Statement - ${customer.name}`, buildCustomerStatementHtml(customer))} className="px-3 py-1.5 text-sm border rounded-lg hover:bg-gray-50">🖨 Statement</button>
                                            </div>
                                        </div>
                                    </div>
                                    {customer.invoices.length > 0 ? (
                                        <table className="w-full mt-4">
                                            <thead className="bg-gray-50">
                                                <tr>
                                                    <th className="px-4 py-2 text-left text-xs font-medium text-gray-500">Invoice #</th>
                                                    <th className="px-4 py-2 text-left text-xs font-medium text-gray-500">Date</th>
                                                    <th className="px-4 py-2 text-left text-xs font-medium text-gray-500">Due Date</th>
                                                    <th className="px-4 py-2 text-left text-xs font-medium text-gray-500">Status</th>
                                                    <th className="px-4 py-2 text-right text-xs font-medium text-gray-500">Total</th>
                                                    <th className="px-4 py-2 text-right text-xs font-medium text-gray-500">Paid</th>
                                                    <th className="px-4 py-2 text-right text-xs font-medium text-gray-500">Balance</th>
                                                    <th className="px-4 py-2 text-center text-xs font-medium text-gray-500">Action</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {customer.invoices.slice().sort((a, b) => new Date(b.date) - new Date(a.date)).map(invoice => (
                                                    <tr key={invoice.id} className="hover:bg-gray-50">
                                                        <td className="px-4 py-2 text-sm font-medium">{invoice.id}</td>
                                                        <td className="px-4 py-2 text-sm">{formatDate(invoice.date)}</td>
                                                        <td className="px-4 py-2 text-sm">{formatDate(invoice.dueDate)}</td>
                                                        <td className="px-4 py-2 text-sm"><span className={`px-2 py-1 rounded text-xs font-medium ${getStatusColor(invoice.status)}`}>{invoice.status}</span></td>
                                                        <td className="px-4 py-2 text-sm text-right">{formatCurrency(invoice.total)}</td>
                                                        <td className="px-4 py-2 text-sm text-right">{formatCurrency(invoice.amountPaid)}</td>
                                                        <td className="px-4 py-2 text-sm text-right font-medium">{formatCurrency(invoice.balance)}</td>
                                                        <td className="px-4 py-2 text-center space-x-2 whitespace-nowrap">
                                                            <button onClick={() => openPrintWindow(`Invoice ${invoice.id}`, buildInvoiceHtml(invoice, customer))} className="text-gray-600 hover:text-gray-900 text-sm font-medium">🖨 Print</button>
                                                            {invoice.balance > 0 && (
                                                                <button onClick={() => { setSelectedInvoice(invoice); setPaymentForm({...emptyPaymentForm, amount: invoice.balance.toString()}); setShowPaymentForm(true); }} className="text-blue-600 hover:text-blue-800 text-sm font-medium">Pay</button>
                                                            )}
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    ) : (
                                        <p className="text-sm text-gray-400 mt-2">No invoices yet.</p>
                                    )}
                                </div>
                            ))}
                        </div>
                    )}

                    {activeTab === 'aging' && (
                        <div className="bg-white rounded-lg shadow p-6 overflow-x-auto">
                            <h3 className="text-lg font-semibold mb-4">Receivables Aging</h3>
                            {buildAgingTable(agingRows)}
                        </div>
                    )}

                    {activeTab === 'payments' && (
                        <div className="bg-white rounded-lg shadow p-6 overflow-x-auto">
                            <h3 className="text-lg font-semibold mb-4">Customer Payments</h3>
                            <table className="w-full">
                                <thead className="bg-gray-50">
                                    <tr>
                                        <th className="px-4 py-2 text-left text-xs font-medium text-gray-500">Date</th>
                                        <th className="px-4 py-2 text-left text-xs font-medium text-gray-500">Customer</th>
                                        <th className="px-4 py-2 text-left text-xs font-medium text-gray-500">Method</th>
                                        <th className="px-4 py-2 text-left text-xs font-medium text-gray-500">Applied To</th>
                                        <th className="px-4 py-2 text-right text-xs font-medium text-gray-500">Amount</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {allPayments.length === 0 && <tr><td colSpan="5" className="px-4 py-4 text-center text-sm text-gray-400">No payments recorded</td></tr>}
                                    {allPayments.map(p => (
                                        <tr key={p.id} className="hover:bg-gray-50">
                                            <td className="px-4 py-2 text-sm">{formatDate(p.date)}</td>
                                            <td className="px-4 py-2 text-sm">{p.entityName}</td>
                                            <td className="px-4 py-2 text-sm">{paymentMethodLabel(p.paymentMethod)}</td>
                                            <td className="px-4 py-2 text-sm">{p.applied}</td>
                                            <td className="px-4 py-2 text-sm text-right font-medium">{formatCurrency(p.amount)}</td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    )}

                    <Modal isOpen={showInvoiceForm} onClose={() => setShowInvoiceForm(false)} title="Create New Invoice">
                        <form onSubmit={handleCreateInvoice} className="space-y-4">
                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label className="block text-sm font-medium mb-1">Customer</label>
                                    <select required value={invoiceForm.customerId} onChange={e => setInvoiceForm({...invoiceForm, customerId: e.target.value})} className="w-full border rounded-lg px-3 py-2">
                                        <option value="">Select customer...</option>
                                        {state.receivables.customers.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
                                    </select>
                                </div>
                                <div>
                                    <label className="block text-sm font-medium mb-1">Store (Deduct Stock From)</label>
                                    <select required value={invoiceForm.storeId} onChange={e => setInvoiceForm({...invoiceForm, storeId: e.target.value})} className="w-full border rounded-lg px-3 py-2">
                                        <option value="">Select store...</option>
                                        {state.stores.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
                                    </select>
                                </div>
                                <div>
                                    <label className="block text-sm font-medium mb-1">Invoice Date</label>
                                    <input type="date" required value={invoiceForm.date} onChange={e => setInvoiceForm({...invoiceForm, date: e.target.value})} className="w-full border rounded-lg px-3 py-2" />
                                </div>
                                <div>
                                    <label className="block text-sm font-medium mb-1">Due Date</label>
                                    <input type="date" required value={invoiceForm.dueDate} onChange={e => setInvoiceForm({...invoiceForm, dueDate: e.target.value})} className="w-full border rounded-lg px-3 py-2" />
                                </div>
                            </div>
                            <ItemsEditor items={invoiceItems} setItems={setInvoiceItems} products={state.inventory.products} priceField="unitPrice" costLabel="Price" storeId={invoiceForm.storeId} />
                            <div className="flex justify-end space-x-3 pt-2">
                                <button type="button" onClick={() => setShowInvoiceForm(false)} className="px-4 py-2 border rounded-lg">Cancel</button>
                                <button type="submit" className="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">Create Invoice</button>
                            </div>
                        </form>
                    </Modal>

                    <Modal isOpen={showPaymentForm} onClose={() => setShowPaymentForm(false)} title={`Record Payment - ${selectedInvoice ? selectedInvoice.id : ''}`}>
                        {selectedInvoice && (
                            <form onSubmit={handleRecordPayment} className="space-y-4">
                                <p className="text-sm text-gray-500">Balance due: <span className="font-semibold text-gray-900">{formatCurrency(selectedInvoice.balance)}</span></p>
                                <div>
                                    <label className="block text-sm font-medium mb-1">Amount</label>
                                    <input type="number" step="0.01" min="0.01" max={selectedInvoice.balance} required value={paymentForm.amount} onChange={e => setPaymentForm({...paymentForm, amount: e.target.value})} className="w-full border rounded-lg px-3 py-2" />
                                    <p className="text-xs text-gray-400 mt-1">Enter less than the full balance to record a partial payment.</p>
                                </div>
                                <div>
                                    <label className="block text-sm font-medium mb-1">Payment Method</label>
                                    <PaymentMethodSelect value={paymentForm.paymentMethod} onChange={e => setPaymentForm({...paymentForm, paymentMethod: e.target.value})} />
                                </div>
                                <div>
                                    <label className="block text-sm font-medium mb-1">Date</label>
                                    <input type="date" required value={paymentForm.date} onChange={e => setPaymentForm({...paymentForm, date: e.target.value})} className="w-full border rounded-lg px-3 py-2" />
                                </div>
                                <div className="flex justify-end space-x-3">
                                    <button type="button" onClick={() => setShowPaymentForm(false)} className="px-4 py-2 border rounded-lg">Cancel</button>
                                    <button type="submit" className="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">Record Payment</button>
                                </div>
                            </form>
                        )}
                    </Modal>

                    <Modal isOpen={showCustomerPaymentForm} onClose={() => setShowCustomerPaymentForm(false)} title={`Record Customer Payment - ${selectedCustomer ? selectedCustomer.name : ''}`}>
                        {selectedCustomer && (
                            <form onSubmit={handleCustomerPayment} className="space-y-4">
                                <p className="text-sm text-gray-500">Total outstanding: <span className="font-semibold text-gray-900">{formatCurrency(selectedCustomer.totalReceivables)}</span></p>
                                <p className="text-xs text-gray-400">Payment will be automatically applied to the oldest outstanding invoices first.</p>
                                <div>
                                    <label className="block text-sm font-medium mb-1">Amount</label>
                                    <input type="number" step="0.01" min="0.01" max={selectedCustomer.totalReceivables} required value={customerPaymentForm.amount} onChange={e => setCustomerPaymentForm({...customerPaymentForm, amount: e.target.value})} className="w-full border rounded-lg px-3 py-2" />
                                </div>
                                <div>
                                    <label className="block text-sm font-medium mb-1">Payment Method</label>
                                    <PaymentMethodSelect value={customerPaymentForm.paymentMethod} onChange={e => setCustomerPaymentForm({...customerPaymentForm, paymentMethod: e.target.value})} />
                                </div>
                                <div>
                                    <label className="block text-sm font-medium mb-1">Date</label>
                                    <input type="date" required value={customerPaymentForm.date} onChange={e => setCustomerPaymentForm({...customerPaymentForm, date: e.target.value})} className="w-full border rounded-lg px-3 py-2" />
                                </div>
                                <div className="flex justify-end space-x-3">
                                    <button type="button" onClick={() => setShowCustomerPaymentForm(false)} className="px-4 py-2 border rounded-lg">Cancel</button>
                                    <button type="submit" className="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700">Record Payment</button>
                                </div>
                            </form>
                        )}
                    </Modal>

                    <Modal isOpen={showCustomerForm} onClose={() => setShowCustomerForm(false)} title="Add New Customer">
                        <form onSubmit={handleAddCustomer} className="space-y-4">
                            <div>
                                <label className="block text-sm font-medium mb-1">Name</label>
                                <input type="text" required value={customerForm.name} onChange={e => setCustomerForm({...customerForm, name: e.target.value})} className="w-full border rounded-lg px-3 py-2" />
                            </div>
                            <div>
                                <label className="block text-sm font-medium mb-1">Phone</label>
                                <input type="text" value={customerForm.phone} onChange={e => setCustomerForm({...customerForm, phone: e.target.value})} className="w-full border rounded-lg px-3 py-2" />
                            </div>
                            <div>
                                <label className="block text-sm font-medium mb-1">Email</label>
                                <input type="email" value={customerForm.email} onChange={e => setCustomerForm({...customerForm, email: e.target.value})} className="w-full border rounded-lg px-3 py-2" />
                            </div>
                            <div>
                                <label className="block text-sm font-medium mb-1">Address</label>
                                <input type="text" value={customerForm.address} onChange={e => setCustomerForm({...customerForm, address: e.target.value})} className="w-full border rounded-lg px-3 py-2" />
                            </div>
                            <div className="flex justify-end space-x-3">
                                <button type="button" onClick={() => setShowCustomerForm(false)} className="px-4 py-2 border rounded-lg">Cancel</button>
                                <button type="submit" className="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">Add Customer</button>
                            </div>
                        </form>
                    </Modal>
                </div>
            );
        }

        function buildAgingTable(rows) {
            return (
                <table className="w-full">
                    <thead className="bg-gray-50">
                        <tr>
                            <th className="px-4 py-2 text-left text-xs font-medium text-gray-500">Name</th>
                            <th className="px-4 py-2 text-right text-xs font-medium text-gray-500">Current</th>
                            <th className="px-4 py-2 text-right text-xs font-medium text-gray-500">1-30 Days</th>
                            <th className="px-4 py-2 text-right text-xs font-medium text-gray-500">31-60 Days</th>
                            <th className="px-4 py-2 text-right text-xs font-medium text-gray-500">61-90 Days</th>
                            <th className="px-4 py-2 text-right text-xs font-medium text-gray-500">90+ Days</th>
                        </tr>
                    </thead>
                    <tbody>
                        {rows.length === 0 && <tr><td colSpan="6" className="px-4 py-4 text-center text-sm text-gray-400">No outstanding balances</td></tr>}
                        {rows.map((r, idx) => (
                            <tr key={idx} className="hover:bg-gray-50">
                                <td className="px-4 py-2 text-sm font-medium">{r.name}</td>
                                <td className="px-4 py-2 text-sm text-right">{formatCurrency(r.current)}</td>
                                <td className="px-4 py-2 text-sm text-right">{formatCurrency(r.days30)}</td>
                                <td className="px-4 py-2 text-sm text-right">{formatCurrency(r.days60)}</td>
                                <td className="px-4 py-2 text-sm text-right">{formatCurrency(r.days90)}</td>
                                <td className="px-4 py-2 text-sm text-right text-red-600">{formatCurrency(r.over90)}</td>
                            </tr>
                        ))}
                    </tbody>
                </table>
            );
        }

        // ==================== PAYABLES ====================
        function Payables() {
            const { state, dispatch } = useAccounting();
            const [activeTab, setActiveTab] = useState('vendors');
            const [showBillForm, setShowBillForm] = useState(false);
            const [showPaymentForm, setShowPaymentForm] = useState(false);
            const [showVendorPaymentForm, setShowVendorPaymentForm] = useState(false);
            const [showVendorForm, setShowVendorForm] = useState(false);
            const [selectedBill, setSelectedBill] = useState(null);
            const [selectedVendor, setSelectedVendor] = useState(null);
            const [billItems, setBillItems] = useState([{ productId: '', quantity: 1, unitCost: 0 }]);
            const emptyBillForm = { vendorId: '', date: new Date().toISOString().split('T')[0], dueDate: '', storeId: state.stores[0] ? state.stores[0].id : '' };
            const [billForm, setBillForm] = useState(emptyBillForm);
            const emptyPaymentForm = { amount: '', paymentMethod: 'CASH', date: new Date().toISOString().split('T')[0] };
            const [paymentForm, setPaymentForm] = useState(emptyPaymentForm);
            const [vendorPaymentForm, setVendorPaymentForm] = useState(emptyPaymentForm);
            const emptyVendorForm = { name: '', phone: '', email: '', address: '' };
            const [vendorForm, setVendorForm] = useState(emptyVendorForm);

            const handleCreateBill = (e) => {
                e.preventDefault();
                const items = billItems.map(item => {
                    const product = state.inventory.products.find(p => p.id === item.productId);
                    return { productId: item.productId, productName: product ? product.name : '', quantity: parseInt(item.quantity) || 0, unitCost: parseFloat(item.unitCost) || 0 };
                });
                dispatch({ type: ACTIONS.CREATE_BILL, payload: { ...billForm, items } });
                setShowBillForm(false);
                setBillItems([{ productId: '', quantity: 1, unitCost: 0 }]);
                setBillForm(emptyBillForm);
            };

            const handleRecordPayment = (e) => {
                e.preventDefault();
                dispatch({ type: ACTIONS.RECORD_BILL_PAYMENT, payload: { billId: selectedBill.id, amount: parseFloat(paymentForm.amount), paymentMethod: paymentForm.paymentMethod, date: paymentForm.date } });
                setShowPaymentForm(false);
                setPaymentForm(emptyPaymentForm);
            };

            const handleVendorPayment = (e) => {
                e.preventDefault();
                dispatch({ type: ACTIONS.VENDOR_PAYMENT, payload: { vendorId: selectedVendor.id, amount: parseFloat(vendorPaymentForm.amount), paymentMethod: vendorPaymentForm.paymentMethod, date: vendorPaymentForm.date } });
                setShowVendorPaymentForm(false);
                setVendorPaymentForm(emptyPaymentForm);
            };

            const handleAddVendor = (e) => {
                e.preventDefault();
                dispatch({ type: ACTIONS.ADD_VENDOR, payload: vendorForm });
                setShowVendorForm(false);
                setVendorForm(emptyVendorForm);
            };

            const agingRows = computeAgingRows(state.payables.vendors, 'bills');
            const allPayments = state.payables.vendors.flatMap(v => (v.payments || []).map(p => ({ ...p, entityName: v.name, applied: p.allocations.map(a => a.billId).join(', ') }))).sort((a, b) => new Date(b.date) - new Date(a.date));

            return (
                <div className="space-y-6 fade-in">
                    <div className="flex justify-between items-center flex-wrap gap-2">
                        <h1 className="text-3xl font-bold text-gray-900">Accounts Payable</h1>
                        <div className="space-x-2 flex">
                            <PrintButton onClick={() => {
                                if (activeTab === 'payments') openPrintWindow('Vendor Payments Report', buildPaymentsListHtml(allPayments, 'Vendor'));
                                else openPrintWindow('Payables Aging Report', buildAgingHtml(agingRows, 'Vendor'));
                            }} />
                            <button onClick={() => setShowVendorForm(true)} className="px-4 py-2 border border-blue-600 text-blue-600 rounded-lg hover:bg-blue-50">+ Vendor</button>
                            <button onClick={() => setShowBillForm(true)} className="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">+ New Bill</button>
                        </div>
                    </div>

                    <div className="flex space-x-4 border-b">
                        <button onClick={() => setActiveTab('vendors')} className={`px-4 py-2 font-medium ${activeTab === 'vendors' ? 'border-b-2 border-blue-600 text-blue-600' : 'text-gray-500'}`}>Vendors</button>
                        <button onClick={() => setActiveTab('aging')} className={`px-4 py-2 font-medium ${activeTab === 'aging' ? 'border-b-2 border-blue-600 text-blue-600' : 'text-gray-500'}`}>Aging Summary</button>
                        <button onClick={() => setActiveTab('payments')} className={`px-4 py-2 font-medium ${activeTab === 'payments' ? 'border-b-2 border-blue-600 text-blue-600' : 'text-gray-500'}`}>Payments</button>
                    </div>

                    {activeTab === 'vendors' && (
                        <div className="space-y-4">
                            {state.payables.vendors.length === 0 && (
                                <div className="bg-white rounded-lg shadow p-6 text-gray-500 text-center">No vendors yet. Add one to get started.</div>
                            )}
                            {state.payables.vendors.map(vendor => (
                                <div key={vendor.id} className="bg-white rounded-lg shadow p-6">
                                    <div className="flex justify-between items-start mb-4 flex-wrap gap-2">
                                        <div>
                                            <h3 className="text-lg font-semibold">{vendor.name}</h3>
                                            <p className="text-sm text-gray-500">{vendor.email} • {vendor.phone}</p>
                                        </div>
                                        <div className="flex items-center gap-4">
                                            <div className="text-right">
                                                <p className="text-sm text-gray-500">Outstanding</p>
                                                <p className="text-2xl font-bold text-red-600">{formatCurrency(vendor.totalPayables)}</p>
                                            </div>
                                            <div className="space-x-2 flex flex-col gap-2">
                                                <button disabled={vendor.totalPayables <= 0} onClick={() => { setSelectedVendor(vendor); setVendorPaymentForm({...emptyPaymentForm, amount: Math.min(vendor.totalPayables, state.cashbook.balance).toString()}); setShowVendorPaymentForm(true); }} className="px-3 py-1.5 text-sm bg-green-600 text-white rounded-lg hover:bg-green-700 disabled:opacity-40 disabled:cursor-not-allowed">+ Payment</button>
                                                <button onClick={() => openPrintWindow(`Statement - ${vendor.name}`, buildVendorStatementHtml(vendor))} className="px-3 py-1.5 text-sm border rounded-lg hover:bg-gray-50">🖨 Statement</button>
                                            </div>
                                        </div>
                                    </div>
                                    {vendor.bills.length > 0 ? (
                                        <table className="w-full mt-4">
                                            <thead className="bg-gray-50">
                                                <tr>
                                                    <th className="px-4 py-2 text-left text-xs font-medium text-gray-500">Bill #</th>
                                                    <th className="px-4 py-2 text-left text-xs font-medium text-gray-500">Date</th>
                                                    <th className="px-4 py-2 text-left text-xs font-medium text-gray-500">Due Date</th>
                                                    <th className="px-4 py-2 text-left text-xs font-medium text-gray-500">Status</th>
                                                    <th className="px-4 py-2 text-right text-xs font-medium text-gray-500">Total</th>
                                                    <th className="px-4 py-2 text-right text-xs font-medium text-gray-500">Paid</th>
                                                    <th className="px-4 py-2 text-right text-xs font-medium text-gray-500">Balance</th>
                                                    <th className="px-4 py-2 text-center text-xs font-medium text-gray-500">Action</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {vendor.bills.slice().sort((a, b) => new Date(b.date) - new Date(a.date)).map(bill => (
                                                    <tr key={bill.id} className="hover:bg-gray-50">
                                                        <td className="px-4 py-2 text-sm font-medium">{bill.id}</td>
                                                        <td className="px-4 py-2 text-sm">{formatDate(bill.date)}</td>
                                                        <td className="px-4 py-2 text-sm">{formatDate(bill.dueDate)}</td>
                                                        <td className="px-4 py-2 text-sm"><span className={`px-2 py-1 rounded text-xs font-medium ${getStatusColor(bill.status)}`}>{bill.status}</span></td>
                                                        <td className="px-4 py-2 text-sm text-right">{formatCurrency(bill.total)}</td>
                                                        <td className="px-4 py-2 text-sm text-right">{formatCurrency(bill.amountPaid)}</td>
                                                        <td className="px-4 py-2 text-sm text-right font-medium">{formatCurrency(bill.balance)}</td>
                                                        <td className="px-4 py-2 text-center space-x-2 whitespace-nowrap">
                                                            <button onClick={() => openPrintWindow(`Bill ${bill.id}`, buildBillHtml(bill, vendor))} className="text-gray-600 hover:text-gray-900 text-sm font-medium">🖨 Print</button>
                                                            {bill.balance > 0 && (
                                                                <button onClick={() => { setSelectedBill(bill); setPaymentForm({...emptyPaymentForm, amount: bill.balance.toString()}); setShowPaymentForm(true); }} className="text-blue-600 hover:text-blue-800 text-sm font-medium">Pay</button>
                                                            )}
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    ) : (
                                        <p className="text-sm text-gray-400 mt-2">No bills yet.</p>
                                    )}
                                </div>
                            ))}
                        </div>
                    )}

                    {activeTab === 'aging' && (
                        <div className="bg-white rounded-lg shadow p-6 overflow-x-auto">
                            <h3 className="text-lg font-semibold mb-4">Payables Aging</h3>
                            {buildAgingTable(agingRows)}
                        </div>
                    )}

                    {activeTab === 'payments' && (
                        <div className="bg-white rounded-lg shadow p-6 overflow-x-auto">
                            <h3 className="text-lg font-semibold mb-4">Vendor Payments</h3>
                            <table className="w-full">
                                <thead className="bg-gray-50">
                                    <tr>
                                        <th className="px-4 py-2 text-left text-xs font-medium text-gray-500">Date</th>
                                        <th className="px-4 py-2 text-left text-xs font-medium text-gray-500">Vendor</th>
                                        <th className="px-4 py-2 text-left text-xs font-medium text-gray-500">Method</th>
                                        <th className="px-4 py-2 text-left text-xs font-medium text-gray-500">Applied To</th>
                                        <th className="px-4 py-2 text-right text-xs font-medium text-gray-500">Amount</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {allPayments.length === 0 && <tr><td colSpan="5" className="px-4 py-4 text-center text-sm text-gray-400">No payments recorded</td></tr>}
                                    {allPayments.map(p => (
                                        <tr key={p.id} className="hover:bg-gray-50">
                                            <td className="px-4 py-2 text-sm">{formatDate(p.date)}</td>
                                            <td className="px-4 py-2 text-sm">{p.entityName}</td>
                                            <td className="px-4 py-2 text-sm">{paymentMethodLabel(p.paymentMethod)}</td>
                                            <td className="px-4 py-2 text-sm">{p.applied}</td>
                                            <td className="px-4 py-2 text-sm text-right font-medium">{formatCurrency(p.amount)}</td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    )}

                    <Modal isOpen={showBillForm} onClose={() => setShowBillForm(false)} title="Create New Bill">
                        <form onSubmit={handleCreateBill} className="space-y-4">
                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label className="block text-sm font-medium mb-1">Vendor</label>
                                    <select required value={billForm.vendorId} onChange={e => setBillForm({...billForm, vendorId: e.target.value})} className="w-full border rounded-lg px-3 py-2">
                                        <option value="">Select vendor...</option>
                                        {state.payables.vendors.map(v => <option key={v.id} value={v.id}>{v.name}</option>)}
                                    </select>
                                </div>
                                <div>
                                    <label className="block text-sm font-medium mb-1">Receiving Store</label>
                                    <select required value={billForm.storeId} onChange={e => setBillForm({...billForm, storeId: e.target.value})} className="w-full border rounded-lg px-3 py-2">
                                        <option value="">Select store...</option>
                                        {state.stores.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
                                    </select>
                                </div>
                                <div>
                                    <label className="block text-sm font-medium mb-1">Bill Date</label>
                                    <input type="date" required value={billForm.date} onChange={e => setBillForm({...billForm, date: e.target.value})} className="w-full border rounded-lg px-3 py-2" />
                                </div>
                                <div>
                                    <label className="block text-sm font-medium mb-1">Due Date</label>
                                    <input type="date" required value={billForm.dueDate} onChange={e => setBillForm({...billForm, dueDate: e.target.value})} className="w-full border rounded-lg px-3 py-2" />
                                </div>
                            </div>
                            <ItemsEditor items={billItems} setItems={setBillItems} products={state.inventory.products} priceField="unitCost" costLabel="Cost" storeId={billForm.storeId} />
                            <div className="flex justify-end space-x-3 pt-2">
                                <button type="button" onClick={() => setShowBillForm(false)} className="px-4 py-2 border rounded-lg">Cancel</button>
                                <button type="submit" className="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">Create Bill</button>
                            </div>
                        </form>
                    </Modal>

                    <Modal isOpen={showPaymentForm} onClose={() => setShowPaymentForm(false)} title={`Record Payment - ${selectedBill ? selectedBill.id : ''}`}>
                        {selectedBill && (
                            <form onSubmit={handleRecordPayment} className="space-y-4">
                                <p className="text-sm text-gray-500">Balance due: <span className="font-semibold text-gray-900">{formatCurrency(selectedBill.balance)}</span></p>
                                <p className="text-sm text-gray-500">Cash available: <span className="font-semibold text-gray-900">{formatCurrency(state.cashbook.balance)}</span></p>
                                <div>
                                    <label className="block text-sm font-medium mb-1">Amount</label>
                                    <input type="number" step="0.01" min="0.01" max={Math.min(selectedBill.balance, state.cashbook.balance)} required value={paymentForm.amount} onChange={e => setPaymentForm({...paymentForm, amount: e.target.value})} className="w-full border rounded-lg px-3 py-2" />
                                    <p className="text-xs text-gray-400 mt-1">Enter less than the full balance to record a partial payment.</p>
                                </div>
                                <div>
                                    <label className="block text-sm font-medium mb-1">Payment Method</label>
                                    <PaymentMethodSelect value={paymentForm.paymentMethod} onChange={e => setPaymentForm({...paymentForm, paymentMethod: e.target.value})} />
                                </div>
                                <div>
                                    <label className="block text-sm font-medium mb-1">Date</label>
                                    <input type="date" required value={paymentForm.date} onChange={e => setPaymentForm({...paymentForm, date: e.target.value})} className="w-full border rounded-lg px-3 py-2" />
                                </div>
                                <div className="flex justify-end space-x-3">
                                    <button type="button" onClick={() => setShowPaymentForm(false)} className="px-4 py-2 border rounded-lg">Cancel</button>
                                    <button type="submit" className="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">Record Payment</button>
                                </div>
                            </form>
                        )}
                    </Modal>

                    <Modal isOpen={showVendorPaymentForm} onClose={() => setShowVendorPaymentForm(false)} title={`Record Vendor Payment - ${selectedVendor ? selectedVendor.name : ''}`}>
                        {selectedVendor && (
                            <form onSubmit={handleVendorPayment} className="space-y-4">
                                <p className="text-sm text-gray-500">Total outstanding: <span className="font-semibold text-gray-900">{formatCurrency(selectedVendor.totalPayables)}</span></p>
                                <p className="text-sm text-gray-500">Cash available: <span className="font-semibold text-gray-900">{formatCurrency(state.cashbook.balance)}</span></p>
                                <p className="text-xs text-gray-400">Payment will be automatically applied to the oldest outstanding bills first.</p>
                                <div>
                                    <label className="block text-sm font-medium mb-1">Amount</label>
                                    <input type="number" step="0.01" min="0.01" max={Math.min(selectedVendor.totalPayables, state.cashbook.balance)} required value={vendorPaymentForm.amount} onChange={e => setVendorPaymentForm({...vendorPaymentForm, amount: e.target.value})} className="w-full border rounded-lg px-3 py-2" />
                                </div>
                                <div>
                                    <label className="block text-sm font-medium mb-1">Payment Method</label>
                                    <PaymentMethodSelect value={vendorPaymentForm.paymentMethod} onChange={e => setVendorPaymentForm({...vendorPaymentForm, paymentMethod: e.target.value})} />
                                </div>
                                <div>
                                    <label className="block text-sm font-medium mb-1">Date</label>
                                    <input type="date" required value={vendorPaymentForm.date} onChange={e => setVendorPaymentForm({...vendorPaymentForm, date: e.target.value})} className="w-full border rounded-lg px-3 py-2" />
                                </div>
                                <div className="flex justify-end space-x-3">
                                    <button type="button" onClick={() => setShowVendorPaymentForm(false)} className="px-4 py-2 border rounded-lg">Cancel</button>
                                    <button type="submit" className="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700">Record Payment</button>
                                </div>
                            </form>
                        )}
                    </Modal>

                    <Modal isOpen={showVendorForm} onClose={() => setShowVendorForm(false)} title="Add New Vendor">
                        <form onSubmit={handleAddVendor} className="space-y-4">
                            <div>
                                <label className="block text-sm font-medium mb-1">Name</label>
                                <input type="text" required value={vendorForm.name} onChange={e => setVendorForm({...vendorForm, name: e.target.value})} className="w-full border rounded-lg px-3 py-2" />
                            </div>
                            <div>
                                <label className="block text-sm font-medium mb-1">Phone</label>
                                <input type="text" value={vendorForm.phone} onChange={e => setVendorForm({...vendorForm, phone: e.target.value})} className="w-full border rounded-lg px-3 py-2" />
                            </div>
                            <div>
                                <label className="block text-sm font-medium mb-1">Email</label>

        // ==================== INVENTORY ====================
        function Inventory() {
            const { state, dispatch } = useAccounting();

            const [showStockCard, setShowStockCard] = useState(false);
            const [stockCardProductId, setStockCardProductId] = useState(null);

            const [formData, setFormData] = useState(emptyForm);

            const emptyStoreForm = { name: '', location: '' };
            const [storeForm, setStoreForm] = useState(emptyStoreForm);

            const emptyTransferForm = { productId: '', fromStoreId: '', toStoreId: '', quantity: '', date: new Date().toISOString().split('T')[0], note: '' };
            const [transferForm, setTransferForm] = useState(emptyTransferForm);

            const emptyAdjustForm = { storeId: '', quantity: '', date: new Date().toISOString().split('T')[0], note: '' };
            const [adjustForm, setAdjustForm] = useState(emptyAdjustForm);

            const openAdd = () => { setEditingProduct(null); setFormData(emptyForm); setShowForm(true); };
            const openEdit = (product) => {
                setEditingProduct(product);
                setFormData({ ...product, costPrice: product.costPrice.toString(), sellingPrice: product.sellingPrice.toString(), reorderLevel: product.reorderLevel.toString(), storeId: '', quantity: '' });
                setShowForm(true);
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                if (editingProduct) {
                    const payload = {
                        id: editingProduct.id, name: formData.name, sku: formData.sku, category: formData.category,
                        costPrice: parseFloat(formData.costPrice) || 0, sellingPrice: parseFloat(formData.sellingPrice) || 0,
                        reorderLevel: parseInt(formData.reorderLevel) || 0, unit: formData.unit, description: formData.description,
                    };
                    dispatch({ type: ACTIONS.UPDATE_PRODUCT, payload });
                } else {
                    const payload = {
                        name: formData.name, sku: formData.sku, category: formData.category,
                        costPrice: parseFloat(formData.costPrice) || 0, sellingPrice: parseFloat(formData.sellingPrice) || 0,
                        reorderLevel: parseInt(formData.reorderLevel) || 0, unit: formData.unit, description: formData.description,
                        storeId: formData.storeId, quantity: parseInt(formData.quantity) || 0,
                    };
                    dispatch({ type: ACTIONS.ADD_PRODUCT, payload });
                }
                setShowForm(false);
                setFormData(emptyForm);
                setEditingProduct(null);
            };

            const handleAddStore = (e) => {
                e.preventDefault();
                dispatch({ type: ACTIONS.ADD_STORE, payload: storeForm });
                setShowStoreForm(false);
                setStoreForm(emptyStoreForm);
            };

            const openTransfer = (productId) => {
                setTransferForm({ ...emptyTransferForm, productId: productId || '' });
                setShowTransfer(true);
            };

            const handleTransfer = (e) => {
                e.preventDefault();
                dispatch({ type: ACTIONS.TRANSFER_STOCK, payload: { ...transferForm, quantity: parseInt(transferForm.quantity) || 0 } });
                setShowTransfer(false);
                setTransferForm(emptyTransferForm);
            };

            const openStockCard = (productId) => {
                setStockCardProductId(productId);
                setAdjustForm({ ...emptyAdjustForm, storeId: state.stores[0] ? state.stores[0].id : '' });
                setShowStockCard(true);
            };

            const handleAdjust = (e) => {
                e.preventDefault();
                dispatch({ type: ACTIONS.STOCK_ADJUSTMENT, payload: { productId: stockCardProductId, storeId: adjustForm.storeId, quantity: parseInt(adjustForm.quantity) || 0, date: adjustForm.date, note: adjustForm.note } });

                    {activeTab === 'products' && (

                                        <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Category</th>
                                        <th className="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase">Cost</th>

                    <Modal isOpen={showForm} onClose={() => setShowForm(false)} title={editingProduct ? 'Edit Product' : 'New Product'}>

                                        <option value="">Select store...</option>

                                    </select>
                                </div>
                                <div>
                                    <label className="block text-sm font-medium mb-1">To Store</label>
                                    <select required value={transferForm.toStoreId} onChange={e => setTransferForm({...transferForm, toStoreId: e.target.value})} className="w-full border rounded-lg px-3 py-2">
                                        <option value="">Select store...</option>
                                        {state.stores.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
                                    </select>
                                </div>

                                <div>
                                    <label className="block text-sm font-medium mb-1">Quantity</label>

        // ==================== UPGRADE PROMPT ====================
        function UpgradePrompt({ requiredModule, currentTier }) {
            const tier = SUBSCRIPTION_TIERS[currentTier] || SUBSCRIPTION_TIERS.free;
            const requiredTier = Object.entries(SUBSCRIPTION_TIERS).find(([k, v]) => 
                v.modules.includes(requiredModule) && v.price > 0
            );

            return (
                <div className="min-h-screen flex items-center justify-center bg-gray-100 p-4">

                        <div className="text-6xl mb-4">🔒</div>
