                        <p className="text-gray-500 mb-4">
                            Your current plan <strong>{tier.name}</strong> does not include 
                            <strong> {MODULE_NAMES[requiredModule]}</strong>.
                        </p>
                        <div className="bg-gray-50 rounded-lg p-4 mb-4">
                            <p className="text-sm text-gray-600">Your current modules:</p>
                            <p className="font-medium">{tier.modules.map(m => MODULE_NAMES[m]).join(', ')}</p>
                        </div>
                        {requiredTier && (
                            <div className="space-y-2">
                                <p className="text-sm text-gray-500">Upgrade to unlock:</p>
                                <div className="border rounded-lg p-4">
                                    <h3 className="font-bold">{requiredTier[1].name}</h3>
                                    <p className="text-2xl font-bold text-blue-600">${requiredTier[1].price}<span className="text-sm font-normal">/mo</span></p>
                                    <p className="text-sm text-gray-500">Includes: {requiredTier[1].modules.map(m => MODULE_NAMES[m]).join(', ')}</p>
                                </div>
                                <p className="text-xs text-gray-400 mt-2">Contact your account manager to upgrade</p>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // ==================== SUBSCRIPTION MANAGER (ADMIN) ====================
        // Reads and writes real customer companies in Firestore (db.collection('companies')).
        // Each company document's `subscription` field is the single source of truth that
        // hasModuleAccess() checks, so changes made here take effect for that customer immediately.
        function SubscriptionManager() {
            const [customers, setCustomers] = useState([]);
            const [loading, setLoading] = useState(true);
            const [selectedCustomer, setSelectedCustomer] = useState(null);
            const [showAssignModal, setShowAssignModal] = useState(false);
            const [searchTerm, setSearchTerm] = useState('');
            const [revenue, setRevenue] = useState({ total: 0, monthly: 0, active: 0, expired: 0 });

            useEffect(() => {
                loadCustomers();
            }, []);

            const loadCustomers = async () => {
                setLoading(true);
                try {
                    const snap = await db.collection('companies').orderBy('createdAt', 'desc').get();
                    const data = snap.docs.map(d => {
                        const c = d.data();
                        return {
                            id: d.id,
                            name: c.name,
                            email: c.ownerEmail,
                            subscription: c.subscription || null,
                            totalPaid: c.totalPaid || 0
                        };
                    });
                    setCustomers(data);
                    calculateRevenue(data);
                } catch (e) {
                    console.error('Failed to load customers', e);
                } finally {
                    setLoading(false);
                }
            };

            const calculateRevenue = (data) => {
                const total = data.reduce((sum, c) => sum + (c.totalPaid || 0), 0);
                const monthly = data.reduce((sum, c) => {
                    const tier = SUBSCRIPTION_TIERS[c.subscription?.tier];
                    return sum + (tier ? tier.price : 0);
                }, 0);
                const active = data.filter(c => c.subscription?.status === 'active' && !isSubscriptionExpired(c.subscription)).length;
                const expired = data.filter(c => isSubscriptionExpired(c.subscription)).length;
                setRevenue({ total, monthly, active, expired });
            };

            const assignSubscription = async (customerId, tierKey) => {
                const tier = SUBSCRIPTION_TIERS[tierKey];
                const now = new Date();
                const expiresAt = new Date(now.getTime() + tier.durationDays * 24 * 60 * 60 * 1000);
                const existing = customers.find(c => c.id === customerId);
                const newSubscription = {
                    tier: tierKey,
                    status: tierKey === 'free' ? 'trial' : 'active',
                    startedAt: now.toISOString(),
                    expiresAt: expiresAt.toISOString(),
                    paymentMethod: 'MANUAL',
                    autoRenew: false
                };
                const newTotalPaid = (existing?.totalPaid || 0) + tier.price;

                await db.collection('companies').doc(customerId).update({
                    subscription: newSubscription,
                    totalPaid: newTotalPaid
                });

                const updated = customers.map(c => c.id === customerId ? { ...c, subscription: newSubscription, totalPaid: newTotalPaid } : c);
                setCustomers(updated);
                calculateRevenue(updated);
                setShowAssignModal(false);
            };

            const extendSubscription = async (customerId, extraDays) => {
                const existing = customers.find(c => c.id === customerId);
                if (!existing?.subscription) return;
                const currentExpiry = new Date(existing.subscription.expiresAt);
                const newExpiry = new Date(currentExpiry.getTime() + extraDays * 24 * 60 * 60 * 1000);
                const newSubscription = { ...existing.subscription, expiresAt: newExpiry.toISOString(), status: 'active' };

                await db.collection('companies').doc(customerId).update({ subscription: newSubscription });

                const updated = customers.map(c => c.id === customerId ? { ...c, subscription: newSubscription } : c);
                setCustomers(updated);
                calculateRevenue(updated);
            };

            const revokeAccess = async (customerId) => {
                const existing = customers.find(c => c.id === customerId);
                if (!existing?.subscription) return;
                const newSubscription = { ...existing.subscription, status: 'suspended' };

                await db.collection('companies').doc(customerId).update({ subscription: newSubscription });

                const updated = customers.map(c => c.id === customerId ? { ...c, subscription: newSubscription } : c);
                setCustomers(updated);
                calculateRevenue(updated);
            };

            const filtered = customers.filter(c => 
                c.name?.toLowerCase().includes(searchTerm.toLowerCase()) ||
                c.email?.toLowerCase().includes(searchTerm.toLowerCase())
            );

            return (
                <div className="space-y-6 fade-in">
                    <h1 className="text-3xl font-bold text-gray-900">Subscription Management</h1>

                    <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                        <div className="bg-white rounded-lg shadow p-6">
                            <p className="text-sm text-gray-500">Total Revenue</p>
                            <p className="text-2xl font-bold text-green-600">{formatCurrency(revenue.total)}</p>
                        </div>
                        <div className="bg-white rounded-lg shadow p-6">
                            <p className="text-sm text-gray-500">Monthly Recurring</p>
                            <p className="text-2xl font-bold text-blue-600">{formatCurrency(revenue.monthly)}</p>
                        </div>
                        <div className="bg-white rounded-lg shadow p-6">
                            <p className="text-sm text-gray-500">Active Subscriptions</p>
                            <p className="text-2xl font-bold text-gray-900">{revenue.active}</p>
                        </div>
                        <div className="bg-white rounded-lg shadow p-6">
                            <p className="text-sm text-gray-500">Expired / Suspended</p>
                            <p className="text-2xl font-bold text-red-600">{revenue.expired}</p>
                        </div>
                    </div>

                    <div className="bg-white rounded-lg shadow p-6">
                        <div className="flex justify-between items-center mb-4 flex-wrap gap-2">
                            <h3 className="text-lg font-semibold">Customer Subscriptions</h3>
                            <input type="text" placeholder="Search customers..." className="border rounded-lg px-3 py-2"
                                value={searchTerm} onChange={e => setSearchTerm(e.target.value)} />
                        </div>
                        <div className="overflow-x-auto">
                            <table className="w-full">
                                <thead className="bg-gray-50">
                                    <tr>
                                        <th className="px-4 py-2 text-left text-xs font-medium text-gray-500">Customer</th>
                                        <th className="px-4 py-2 text-left text-xs font-medium text-gray-500">Plan</th>
                                        <th className="px-4 py-2 text-left text-xs font-medium text-gray-500">Status</th>
                                        <th className="px-4 py-2 text-left text-xs font-medium text-gray-500">Expires</th>
                                        <th className="px-4 py-2 text-left text-xs font-medium text-gray-500">Paid</th>
                                        <th className="px-4 py-2 text-right text-xs font-medium text-gray-500">Actions</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {loading && (
                                        <tr><td colSpan="6" className="px-4 py-4 text-center text-sm text-gray-400">Loading customers...</td></tr>
                                    )}
                                    {!loading && filtered.length === 0 && (
                                        <tr><td colSpan="6" className="px-4 py-4 text-center text-sm text-gray-400">No customers yet</td></tr>
                                    )}
                                    {filtered.map(customer => (
                                        <tr key={customer.id} className="border-t hover:bg-gray-50">
                                            <td className="px-4 py-3">
                                                <div className="font-medium">{customer.name}</div>
                                                <div className="text-sm text-gray-500">{customer.email}</div>
                                            </td>
                                            <td className="px-4 py-3">
                                                {customer.subscription ? (
                                                    <span className="font-medium">{SUBSCRIPTION_TIERS[customer.subscription.tier]?.name || 'Unknown'}</span>
                                                ) : (<span className="text-gray-400">No plan</span>)}
                                            </td>
                                            <td className="px-4 py-3">
                                                {customer.subscription ? (
                                                    <span className={`px-2 py-1 rounded text-xs font-medium ${
                                                        customer.subscription.status === 'active' && !isSubscriptionExpired(customer.subscription)
                                                            ? 'bg-green-100 text-green-800'
                                                            : customer.subscription.status === 'trial'
                                                            ? 'bg-blue-100 text-blue-800'
                                                            : 'bg-red-100 text-red-800'
                                                    }`}>
                                                        {isSubscriptionExpired(customer.subscription) ? 'EXPIRED' : customer.subscription.status.toUpperCase()}
                                                    </span>
                                                ) : (<span className="px-2 py-1 rounded text-xs font-medium bg-gray-100 text-gray-800">NO PLAN</span>)}
                                            </td>
                                            <td className="px-4 py-3 text-sm">
                                                {customer.subscription ? (
                                                    <span className={isSubscriptionExpired(customer.subscription) ? 'text-red-600 font-medium' : ''}>
                                                        {getDaysRemaining(customer.subscription)} days
                                                    </span>
                                                ) : '—'}
                                            </td>
                                            <td className="px-4 py-3 text-sm font-medium">{formatCurrency(customer.totalPaid || 0)}</td>
                                            <td className="px-4 py-3 text-right space-x-2 whitespace-nowrap">
                                                <button onClick={() => { setSelectedCustomer(customer); setShowAssignModal(true); }}
                                                    className="text-blue-600 hover:text-blue-800 text-sm font-medium">
                                                    {customer.subscription?.tier !== 'free' ? 'Change' : 'Assign'}
                                                </button>
                                                {customer.subscription?.status === 'active' && (
                                                    <button onClick={() => revokeAccess(customer.id)}
                                                        className="text-red-600 hover:text-red-800 text-sm font-medium">Revoke</button>
                                                )}
                                                {!isSubscriptionExpired(customer.subscription) && customer.subscription?.status !== 'suspended' && (
                                                    <button onClick={() => extendSubscription(customer.id, 30)}
                                                        className="text-green-600 hover:text-green-800 text-sm font-medium">+30d</button>
                                                )}
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <div className="bg-white rounded-lg shadow p-6">
                        <h3 className="text-lg font-semibold mb-4">Pricing Plans</h3>
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                            {Object.entries(SUBSCRIPTION_TIERS).map(([key, tier]) => (
                                <div key={key} className="border rounded-lg p-4">
                                    <h4 className="font-bold text-gray-900">{tier.name}</h4>
                                    <p className="text-2xl font-bold text-blue-600 mt-2">
                                        {tier.price === 0 ? 'FREE' : formatCurrency(tier.price)}
                                        <span className="text-sm font-normal text-gray-500">/mo</span>
                                    </p>
                                    <ul className="mt-3 space-y-1 text-sm">
                                        {tier.modules.map(m => (
                                            <li key={m} className="flex items-center gap-2"><span className="text-green-500">✓</span>{MODULE_NAMES[m]}</li>
                                        ))}
                                    </ul>
                                </div>
                            ))}
                        </div>
                    </div>

                    {showAssignModal && selectedCustomer && (
                        <Modal isOpen={true} onClose={() => setShowAssignModal(false)} title={`Assign Plan - ${selectedCustomer.name}`}>
                            <div className="space-y-3">
                                <p className="text-sm text-gray-500">Select a plan for this customer:</p>
                                {Object.entries(SUBSCRIPTION_TIERS).map(([key, tier]) => (
                                    <div key={key} className="border rounded-lg p-4 hover:bg-gray-50 cursor-pointer"
                                        onClick={() => assignSubscription(selectedCustomer.id, key)}>
                                        <div className="flex justify-between items-center">
                                            <div>
                                                <h4 className="font-bold">{tier.name}</h4>
                                                <p className="text-sm text-gray-500">{tier.modules.map(m => MODULE_NAMES[m]).join(', ')}</p>
                                            </div>
                                            <div className="text-right">
                                                <p className="text-xl font-bold text-blue-600">{tier.price === 0 ? 'FREE' : formatCurrency(tier.price)}</p>
                                                <p className="text-xs text-gray-500">{tier.durationDays} days</p>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </Modal>
                    )}
                </div>
            );
        }

function AppContent() {
            const { userDoc } = useAuth();
            const [activePage, setActivePage] = useState('dashboard');
            const pages = { dashboard: Dashboard, cashbook: Cashbook, receivables: Receivables, payables: Payables, inventory: Inventory, admin: SubscriptionManager };
            const { userSubscription } = useAuth();
            const allowedAdmin = activePage === 'admin' && (userDoc?.isSuperAdmin || hasModuleAccess(userSubscription, 'admin'));

            // Check if user has access to the requested page
            const hasAccess = activePage === 'dashboard' || hasModuleAccess(userSubscription, activePage);
            const ActivePage = !hasAccess ? () => React.createElement(UpgradePrompt, { requiredModule: activePage, currentTier: userSubscription?.tier }) 
                : (allowedAdmin ? SubscriptionManager : (pages[activePage] || Dashboard));

            return (
                <div className="flex min-h-screen bg-gray-100">
                    <Sidebar activePage={activePage} setActivePage={setActivePage} />
                    <main className="flex-1 p-8 max-w-6xl">
                        <ActivePage />
                    </main>
                </div>
            );
        }

        function Gate() {
            const { authLoading, firebaseUser, userDoc, company } = useAuth();

            if (authLoading) {
                return <div className="min-h-screen flex items-center justify-center text-gray-500">Loading...</div>;
            }
            if (!firebaseUser || !userDoc) {
                return <LoginSignup />;
            }
            if (!company || company.status !== 'active') {
                return <SuspendedNotice status={company ? company.status : 'inactive'} />;
            }
            return (
                <AccountingProvider companyId={userDoc.companyId}>
                    <AppContent />
                </AccountingProvider>
            );
        }

        function App() {
            return (
                <AuthProvider>
                    <Gate />
                </AuthProvider>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
